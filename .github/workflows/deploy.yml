name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Check secrets are set
        run: |
          echo "HOST is set: ${{ secrets.EC2_HOST != '' }}"
          echo "USER is set: ${{ secrets.EC2_USER != '' }}"
          echo "KEY is set: ${{ secrets.EC2_SSH_KEY != '' }}"

      - name: Copy build files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/"
          target: "/home/${{ secrets.EC2_USER }}/react-app"
          strip_components: 1
          overwrite: true
